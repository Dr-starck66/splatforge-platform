version: "3.9"

# ══════════════════════════════════════════════════════════
# SPLAT·FORGE — Production Docker Compose
# ══════════════════════════════════════════════════════════

services:

  # ── API + Pipeline ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: splatforge-api
    container_name: splatforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - ./data:/app/data
      - colmap-cache:/root/.cache/colmap
      - torch-hub:/root/.cache/torch
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: splatforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx reverse proxy (optional, for HTTPS + static) ──
  nginx:
    image: nginx:alpine
    container_name: splatforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [api]
    profiles: ["prod"]   # only in prod: docker compose --profile prod up

volumes:
  colmap-cache:
  torch-hub:
